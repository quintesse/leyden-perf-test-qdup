
scripts:

  setup:
  - script: clone
    with:
      repo: quarkusio/spring-quarkus-perf-comparison
      dir: sqpc
  - script: java
    with:
      version: 21+
  - script: compile_maven
    with:
      dir: sqpc
  
  pre:
  - script: postgresql_start
    with:
      initdb_dir: ${{setup_dir}}/sqpc/scripts/dbdata
      opts: -e POSTGRES_USER=fruits -e POSTGRES_PASSWORD=fruits -e POSTGRES_DB=fruits
  
  run:
  - log: Starting the test application...
  - sh: java -jar "${{setup_dir}}/sqpc/quarkus3/target/quarkus-app/quarkus-run.jar"
    watch:
      - regex: ".*Listening on.*"
        then:
          - signal: TEST_APP_READY

  post:
  - script: postgresql_stop
